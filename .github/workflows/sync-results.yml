name: Sync WK-uitslagen

# Draait elke minuut, maar het script doet alléén API-werk binnen het wedstrijd-
# venster (1u vóór t/m ~1u ná elke wedstrijd). Tijdens wedstrijden worden de
# uitslagen dus elke minuut bijgewerkt; de bonusvraag-facts ~elke 5 min. Buiten
# het venster en zonder secrets stopt het script direct (groene, lege runs).
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch: {}

# Niet meerdere syncs tegelijk: een nog lopende run wordt afgekapt door de nieuwe
# (de sync is idempotent, dus de volgende minuut wordt alles alsnog bijgewerkt).
concurrency:
  group: sync-wk-uitslagen
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node --experimental-strip-types scripts/sync-apifootball.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          RESULT_SYNC_SECRET: ${{ secrets.RESULT_SYNC_SECRET }}
          SYNC_RESULTS_URL: ${{ secrets.SYNC_RESULTS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
