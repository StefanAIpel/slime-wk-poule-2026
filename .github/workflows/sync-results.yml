name: Sync WK-uitslagen

# Haalt elke ~5 min de WK-uitslagen bij API-Football op en stuurt ze naar
# /api/sync-results. Doet niets tot de repository-secrets zijn ingesteld
# (de worker stopt dan netjes) en buiten het toernooivenster.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Niet meerdere syncs tegelijk laten lopen.
concurrency:
  group: sync-wk-uitslagen
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node --experimental-strip-types scripts/sync-apifootball.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          RESULT_SYNC_SECRET: ${{ secrets.RESULT_SYNC_SECRET }}
          SYNC_RESULTS_URL: ${{ secrets.SYNC_RESULTS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
